<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="词崽">
<meta name="theme-color" content="#d3e1b9">
<title>ことも · 词崽</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E%F0%9F%90%B1%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- 字体异步加载(media=print onload 切回)：fonts.googleapis 在部分网络(如国内)会挂起，绝不能阻塞首屏 -->
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
  html, body { margin: 0; padding: 0; background: #d3e1b9; -webkit-tap-highlight-color: transparent; }
  #root { min-height: 100vh; }
  #boot { min-height: 100vh; display: grid; place-items: center; font-family: 'DotGothic16','PingFang SC','Microsoft YaHei',monospace; color: #3b4030; text-align: center; }
  #boot .cat { font-size: 64px; animation: bob 1.4s ease-in-out infinite; }
  #boot .msg { margin-top: 10px; font-size: 14px; }
  #boot .err { max-width: 300px; font-size: 13px; line-height: 1.8; padding: 0 24px; }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
</style>
</head>
<body>
<div id="root"><div id="boot"><div><div class="cat">🐱</div><div class="msg">词崽加载中…</div></div></div></div>

<!-- React / Babel 走 CDN（需联网启动）。版本钉死到具体号：浮动 @18/@7 会在上游发新版时悄悄换代码，既可能一夜坏掉也有供应链风险 -->
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<!-- 离线词典 kuromoji 在 Web Worker 内按需加载（见 kotomo.jsx），主线程不再引入，避免构建卡顿 -->

<script>
// index.html 是部署外壳：运行时读取 kotomo.jsx → 浏览器内用 Babel 转译 → 渲染。
// 好处：源码只有 kotomo.jsx 一份，改它即生效，本文件不重复代码、不会分叉。
(async function () {
  function fail(msg) {
    // 用 textContent 放报错：Babel 的报错里常带 JSX 源码(<div ...>)，拼进 innerHTML 会被当 HTML 解析、把诊断信息吞掉
    document.getElementById('root').innerHTML =
      '<div id="boot"><div class="err"><div class="cat">🙀</div><div class="msg">词崽没能启动</div><br><pre style="white-space:pre-wrap;text-align:left;font-size:11px;line-height:1.5;margin:0;overflow-x:auto"></pre></div></div>';
    document.querySelector('#boot pre').textContent = msg;
  }
  try {
    // 直接双击本地文件 / 内嵌预览面板打开时没有真实网址，fetch 相对路径必失败 → 给一句能看懂的话
    if (location.protocol !== 'http:' && location.protocol !== 'https:') { fail('这个页面要通过网址访问：在浏览器地址栏输入 cutomrrw.github.io/kotomo 打开（直接双击文件或在预览面板里打开会看到本提示）。'); return; }
    if (!window.React || !window.ReactDOM) { fail('没连上 React CDN（unpkg）。换个网络或稍后再试一次。'); return; }
    if (!window.Babel) { fail('没连上 Babel CDN（unpkg）。换个网络或稍后再试一次。'); return; }

    const res = await fetch('kotomo.jsx?v=' + Date.now()); // 加时间戳避开缓存，改完代码刷新即更新
    if (!res.ok) { fail('找不到 kotomo.jsx（请确认它和 index.html 在同一个文件夹里）。'); return; }
    let src = await res.text();

    // 去掉给打包器用的 import / export，改为直接使用浏览器全局 React
    src = src.replace(/^\s*import\b[^\n]*from\s+["']react["'][^\n]*$/m, '');
    src = src.replace(/export\s+default\s+function\s+App/, 'function App');

    const out = Babel.transform(src, { presets: ['react'], filename: 'kotomo.jsx' }).code;

    const { useState, useEffect, useCallback, useMemo, useRef } = React;
    const factory = new Function(
      'React', 'useState', 'useEffect', 'useCallback', 'useMemo', 'useRef',
      out + '\n;return App;'
    );
    const App = factory(React, useState, useEffect, useCallback, useMemo, useRef);

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  } catch (e) {
    console.error('[kotomo] 启动失败', e);
    fail('出错了：' + ((e && e.message) || e));
  }
})();
</script>
</body>
</html>
