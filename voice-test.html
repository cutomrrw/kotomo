<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ことも · 语音试听</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: -apple-system, "PingFang SC", system-ui, sans-serif; background: #f3e7d6; color: #2b2b2b; padding: 18px 16px 70px; line-height: 1.5; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: #7a7268; font-size: 13px; margin-bottom: 14px; }
  .warn { background: #fff4e0; border: 2px solid #f5a623; border-radius: 12px; padding: 11px 13px; margin-bottom: 14px; font-size: 13px; }
  .phrase { background: #fffdf5; border: 2px dashed #c9bfae; border-radius: 12px; padding: 10px 13px; margin-bottom: 8px; font-size: 14px; }
  .phrase b { color: #4caf50; }
  .sec { font-size: 14px; font-weight: 800; color: #2b2b2b; margin: 20px 0 9px; padding-left: 2px; }
  .btn { display: flex; align-items: center; gap: 12px; width: 100%; border: 3px solid #2b2b2b; background: #fffdf5; color: #2b2b2b; border-radius: 14px; padding: 14px 13px; margin-bottom: 11px; font-size: 16px; font-weight: 800; text-align: left; box-shadow: 4px 4px 0 #2b2b2b; cursor: pointer; }
  .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #2b2b2b; }
  .btn[disabled] { opacity: .55; }
  .btn .ico { font-size: 20px; flex-shrink: 0; width: 24px; text-align: center; }
  .btn .body { flex: 1; min-width: 0; }
  .btn .nm { font-size: 15.5px; }
  .btn .ds { display: block; font-size: 12px; font-weight: 600; color: #7a7268; margin-top: 3px; }
  .btn .st { font-size: 11.5px; font-weight: 800; color: #4caf50; flex-shrink: 0; max-width: 92px; text-align: right; }
  .baseline { background: #efe7d8; }
  .tip { margin-top: 22px; font-size: 12.5px; color: #7a7268; background: #fffdf5; border: 2px solid #e3d8c5; border-radius: 12px; padding: 11px 13px; }
</style>
</head>
<body>
  <h1>ことも · 语音试听 🎧（加量版）</h1>
  <div class="sub">挨个点「▶」，挑你最喜欢的，把名字告诉我，我接进 App。</div>
  <div class="warn">在线动漫语音(VOICEVOX)，要联网、第一次合成等 1～3 秒；连点太快会被<b>限流</b>(显示失败就隔几秒再点)。手机别静音。</div>
  <div class="phrase">试听句：<b>こんにちは！ねこと いっしょに がんばろうね！</b><br><span style="color:#7a7268;font-size:12px;">（你好！和小猫一起加油吧！）</span></div>

  <div id="root"></div>

  <div class="sec">📱 对照：手机自带声（离线）</div>
  <button class="btn baseline" id="sys">
    <span class="ico">▶</span>
    <span class="body"><span class="nm">系统自带日语声</span><span class="ds">iPhone=Kyoko，原音不拔高</span></span>
    <span class="st" id="sys-st"></span>
  </button>

  <div class="tip">🔎 都不满意？还有另一个引擎 <b>COEIROINK</b>（招牌「つくよみちゃん」也是超人气可爱声），告诉我一声我再拉来试听。</div>

<script>
  var TEXT = "こんにちは！ねこと いっしょに がんばろうね！";
  var GROUPS = [
    { title: "🍼 萝莉 / 奶音 / 扮可爱", voices: [
      { id: 45, name: "櫻歌ミコ・萝莉", desc: "ロリ音 · 最嫩最奶" },
      { id: 72, name: "満別花丸・扮可爱", desc: "ぶりっ子 · 撒娇装可爱" },
      { id: 1,  name: "ずんだもん・甜", desc: "あまあま · 甜奶撒娇" },
      { id: 0,  name: "四国めたん・甜", desc: "あまあま · 甜美" },
      { id: 15, name: "九州そら・甜", desc: "あまあま · 甜软" },
    ]},
    { title: "😼 傲娇 / 凶凶", voices: [
      { id: 6,  name: "四国めたん・傲娇", desc: "ツンツン · 凶凶傲娇" },
      { id: 7,  name: "ずんだもん・傲娇", desc: "ツンツン · 凶凶奶" },
    ]},
    { title: "⚡ 元气 / 辣妹 / 搞怪", voices: [
      { id: 8,  name: "春日部つむぎ", desc: "元气辣妹 · 明亮甜" },
      { id: 70, name: "満別花丸・元气", desc: "超有活力" },
      { id: 32, name: "白上虎太郎・哇噢", desc: "わーい · 搞怪欢脱" },
      { id: 24, name: "WhiteCUL・开心", desc: "たのしい · 轻快" },
    ]},
    { title: "🌸 温柔 / 治愈 / 清亮", voices: [
      { id: 10, name: "雨晴はう", desc: "温柔软妹 · 治愈" },
      { id: 14, name: "冥鳴ひまり", desc: "清亮少女" },
      { id: 54, name: "春歌ナナ", desc: "清亮自然" },
      { id: 46, name: "小夜 / SAYO", desc: "慵懒软甜" },
      { id: 74, name: "琴詠ニア", desc: "清爽干净" },
      { id: 68, name: "あいえるたん", desc: "软糯" },
    ]},
    { title: "🐱 猫娘主题（配「词崽」最搭）", voices: [
      { id: 55, name: "猫使アル", desc: "猫娘 · 活泼" },
      { id: 58, name: "猫使ビィ", desc: "猫娘 · 偏软" },
    ]},
    { title: "✨ 其他可爱角色", voices: [
      { id: 3,  name: "ずんだもん・普通", desc: "萌系吉祥物 · 人气No.1" },
      { id: 20, name: "もち子さん", desc: "萌系温软" },
      { id: 61, name: "中国うさぎ", desc: "兔娘 · 软" },
      { id: 67, name: "栗田まろん", desc: "软萌" },
    ]},
    { title: "💼 偏成熟（对比用）", voices: [
      { id: 2,  name: "四国めたん・普通", desc: "标准美少女" },
      { id: 16, name: "九州そら・普通", desc: "御姐偏成熟" },
    ]},
  ];

  function sleep(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }
  var busy = false;

  async function playVoice(speaker, stEl, btn){
    if (busy) return; busy = true; btn.setAttribute('disabled','');
    stEl.textContent = '⏳ 合成中…';
    try {
      var r = await fetch('https://api.tts.quest/v3/voicevox/synthesis?text=' + encodeURIComponent(TEXT) + '&speaker=' + speaker);
      var d = await r.json();
      if (!d || !d.success) throw new Error('接口忙(限流)');
      var ready = false;
      for (var i = 0; i < 25; i++){
        var s = await (await fetch(d.audioStatusUrl)).json();
        if (s.isAudioError) throw new Error('合成出错');
        if (s.isAudioReady){ ready = true; break; }
        await sleep(700);
      }
      if (!ready) throw new Error('超时');
      stEl.textContent = '🔊 播放';
      var a = new Audio(d.mp3DownloadUrl);
      a.onended = function(){ stEl.textContent = '✓ 已听'; };
      a.onerror = function(){ stEl.textContent = '✗ 播放失败'; };
      await a.play();
    } catch(e){
      stEl.textContent = '✗ ' + (e.message || '失败');
    } finally {
      busy = false; btn.removeAttribute('disabled');
    }
  }

  var root = document.getElementById('root');
  GROUPS.forEach(function(g){
    var h = document.createElement('div'); h.className = 'sec'; h.textContent = g.title; root.appendChild(h);
    g.voices.forEach(function(v){
      var b = document.createElement('button'); b.className = 'btn';
      b.innerHTML = '<span class="ico">▶</span><span class="body"><span class="nm">' + v.name + '</span><span class="ds">' + v.desc + '</span></span><span class="st"></span>';
      var st = b.querySelector('.st');
      b.addEventListener('click', function(){ playVoice(v.id, st, b); });
      root.appendChild(b);
    });
  });

  document.getElementById('sys').addEventListener('click', function(){
    var stEl = document.getElementById('sys-st');
    try {
      var u = new SpeechSynthesisUtterance(TEXT);
      u.lang = 'ja-JP'; u.rate = 0.95; u.pitch = 1.0;
      var vs = (speechSynthesis.getVoices()||[]).filter(function(x){ return /ja[-_]?JP/i.test(x.lang||''); });
      if (vs.length) u.voice = vs[0];
      u.onend = function(){ stEl.textContent = '✓ 已听'; };
      stEl.textContent = '🔊 播放';
      speechSynthesis.cancel(); speechSynthesis.speak(u);
    } catch(e){ stEl.textContent = '✗ 失败'; }
  });
</script>
</body>
</html>
